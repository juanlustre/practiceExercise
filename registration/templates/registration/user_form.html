<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f1f5f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 12px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05); background-color: #ffffff; }
        
       
        .card-header-slate { background-color: #1e293b; color: #ffffff; border-top-left-radius: 12px !important; border-top-right-radius: 12px !important; }
        
        .form-label { font-weight: 500; color: #334155; font-size: 0.9rem; }
        .form-control:focus, .form-select:focus { border-color: #0f766e; box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.15); }
        
        .btn-teal { background-color: #0f766e; color: white; border: none; }
        .btn-teal:hover { background-color: #115e59; color: white; }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            
            <div class="card">
                <div class="card-header card-header-slate py-3">
                    <h5 class="mb-0 d-flex align-items-center fw-medium">
                        <i class="bi bi-sliders me-2 text-info"></i> {{ title }} 
                    </h5>
                </div>
                
                <div class="card-body p-4">
                    <form method="post" enctype="multipart/form-data">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label">First Name</label>
                            <input type="text" name="first_name" class="form-control" placeholder="Enter first name" value="{% if user %}{{ user.first_name }}{% endif %}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Last Name</label>
                            <input type="text" name="last_name" class="form-control" placeholder="Enter last name" value="{% if user %}{{ user.last_name }}{% endif %}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Email Address</label>
                            <input type="email" name="email" class="form-control" placeholder="Enter your email" value="{% if user %}{{ user.email }}{% endif %}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" name="password" class="form-control" placeholder="Enter your password" {% if not user %}required{% endif %}>
                            {% if user %}
                                <div class="form-text text-muted small"><i class="bi bi-info-circle"></i> Leave blank to retain current password.</div>
                            {% endif %}
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label">Gender</label>
                            <select name="gender" class="form-select">
                                <option value="">Select gender</option>
                                <option value="Male" {% if user and user.gender == "Male" %}selected{% endif %}>Male</option>
                                <option value="Female" {% if user and user.gender == "Female" %}selected{% endif %}>Female</option>
                                <option value="Other" {% if user and user.gender == "Other" %}selected{% endif %}>Other</option>
                            </select>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label">Profile Picture File</label>
                            <input type="file" name="profile_picture" class="form-control">
                            {% if user and user.profile_picture %}
                                <div class="mt-3 text-center">
                                    <img src="{{ user.profile_picture.url }}" class="rounded-circle shadow-sm border" width="80" height="80" style="object-fit: cover;">
                                </div>
                            {% endif %}
                        </div>
                        
                        <div class="d-flex justify-content-between pt-2">
                            <a href="{% url 'registration:users_html' %}" class="btn btn-outline-secondary px-4">Cancel</a>
                            <button type="submit" class="btn btn-teal px-4 shadow-sm">Save Profile</button>
                        </div>
                        
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>
</body>
</html>
