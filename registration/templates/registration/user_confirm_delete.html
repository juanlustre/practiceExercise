<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Confirm Delete</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f1f5f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { border: none; border-radius: 12px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.05); background-color: #ffffff; }
        
        /* Modern Charcoal Header styling for the removal warning */
        .card-header-delete { background-color: #334155; color: #ffffff; border-top-left-radius: 12px !important; border-top-right-radius: 12px !important; }
        
        .user-highlight { color: #1e293b; font-weight: 700; background-color: #f1f5f9; padding: 4px 10px; border-radius: 6px; border: 1px solid #e2e8f0; }
        
        /* Deep red button for data deletion alignment */
        .btn-crimson { background-color: #dc2626; color: white; border: none; transition: all 0.2s; }
        .btn-crimson:hover { background-color: #b91c1c; color: white; transform: translateY(-1px); }
    </style>
</head>
<body>
<div class="container py-5 mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            
            <div class="card text-center">
                <div class="card-header card-header-delete py-3">
                    <h5 class="mb-0 d-flex align-items-center justify-content-center fw-medium">
                        <i class="bi bi-exclamation-octagon-fill text-warning me-2"></i> Delete User
                    </h5>
                </div>
                
                <div class="card-body p-4 my-2">
                    <i class="bi bi-trash3 text-danger display-4 d-block mb-3 opacity-75"></i>
                    <p class="text-secondary fs-6 mb-4">
                        Are you sure you want to permanently delete<br>
                        <span class="user-highlight d-inline-block mt-2"><i class="bi bi-person-fill text-muted"></i> {{ user.first_name }} {{ user.last_name }}</span>?
                    </p>
                    
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex justify-content-center gap-3">
                            <a href="{% url 'registration:users_html' %}" class="btn btn-outline-secondary px-4">
                                Cancel
                            </a>
                            <button type="submit" class="btn btn-crimson px-4 shadow-sm">
                                Confirm Delete
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>
</body>
</html>
